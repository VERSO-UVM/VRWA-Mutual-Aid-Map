<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VRWA Mutual Aid Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    html, body { height: 100%; }
    #map { height: calc(100vh - 70px - 80px); width: 100%; display: block; }
    .vrwa-marker-icon {
      background: transparent;
      border: none;
    }
    .vrwa-marker-dot {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 14px;
      border: 2px solid #fff;
      box-shadow: 0 1px 6px rgba(0,0,0,0.22);
    }
    .vrwa-cluster-icon {
      background: transparent;
      border: none;
    }
    .vrwa-cluster-bubble {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--primary);
      color: #fff;
      border: 2px solid #fff;
      box-shadow: 0 1px 6px rgba(0,0,0,0.25);
      font-size: 0.82rem;
      font-weight: 700;
    }
    .category-filter-list {
      max-height: 180px;
      overflow: auto;
      padding-right: 4px;
    }
    .category-toggle {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      margin: 0.12rem 0;
      font-size: 0.78rem;
      color: #666;
    }
    .popup-more {
      display: inline-block;
      margin-top: 0.42rem;
      color: #2ea3f2;
      font-weight: 600;
      text-decoration: none;
      font-size: 0.8rem;
    }
    .popup-more:hover { text-decoration: underline; }
  </style>
</head>

    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
    VRWA Mutual Aid Map
  </a>
  <ul class="nav-links">
    <li><a href="index.html" class="active">Map</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="list.html">List</a></li>
    <li><a href="manage.html">Manage</a></li>
  </ul>
</nav>

<div class="page">
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="js/data.js"></script>
<script>
const {
  STATUS_COLORS: DATA_STATUS_COLORS,
  CATEGORY_ICONS: DATA_CATEGORY_ICONS,
  CATEGORIES: DATA_CATEGORIES,
  SYSTEM_TYPES: DATA_SYSTEM_TYPES,
  STATUSES: DATA_STATUSES
} = VRWAData;

const map = L.map('map', { zoomControl: true }).setView([44.2, -72.6], 7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
}).addTo(map);

// Force Leaflet to recalculate container size after layout settles
window.addEventListener('load', function() { map.invalidateSize(); });

const defaultView = { center: [44.2, -72.6], zoom: 7 };
const activeStatuses = new Set(Object.keys(DATA_STATUSES));
const activeCategories = new Set(DATA_CATEGORIES);
const itemById = new Map();

function esc(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function buildSummaryPopup(item) {
  const icon = DATA_CATEGORY_ICONS[item.category] || '📦';
  return `
    <div class="popup-title">${icon} ${esc(item.name || 'Unnamed Item')}</div>
    <a href="#" class="popup-more js-popup-more" data-item-id="${esc(item.id)}">More</a>
  `;
}

function buildDetailPopup(item) {
  const color = DATA_STATUS_COLORS[item.status] || '#999';
  const icon = DATA_CATEGORY_ICONS[item.category] || '📦';
  const systemType = DATA_SYSTEM_TYPES[item.systemType] || item.systemType || '—';
  const status = DATA_STATUSES[item.status] || item.status || '—';

  return `
    <div class="popup-title">${icon} ${esc(item.name || 'Unnamed Item')}</div>
    <div class="popup-row"><span class="popup-label">Category</span><span class="popup-val">${esc(item.category || 'Other')}</span></div>
    <div class="popup-row"><span class="popup-label">Organization</span><span class="popup-val">${esc(item.organization || '—')}</span></div>
    <div class="popup-row"><span class="popup-label">Location</span><span class="popup-val">${esc(item.town || '—')}, ${esc(item.state || '—')}</span></div>
    <div class="popup-row"><span class="popup-label">System</span><span class="popup-val">${esc(systemType)}</span></div>
    <div class="popup-row"><span class="popup-label">Qty</span><span class="popup-val">${esc(item.quantity || '—')}</span></div>
    <div class="popup-row"><span class="popup-label">Status</span><span class="popup-val"><strong style="color:${color}">${esc(status)}</strong></span></div>
    ${item.description ? `<div style="margin-top:0.5rem;font-size:0.78rem;color:#555;line-height:1.4">${esc(item.description)}</div>` : ''}
    ${item.contact ? `<div style="margin-top:0.4rem;font-size:0.78rem;color:#2e86c1">📞 ${esc(item.contact)}</div>` : ''}
  `;
}

function buildMarkerIcon(item) {
  const color = DATA_STATUS_COLORS[item.status] || '#999';
  const icon = DATA_CATEGORY_ICONS[item.category] || '📦';
  return L.divIcon({
    className: 'vrwa-marker-icon',
    html: `<div class="vrwa-marker-dot" style="background:${color}">${icon}</div>`,
    iconSize: [28, 28],
    iconAnchor: [14, 14],
    popupAnchor: [0, -12]
  });
}

// ── Filter controls ───────────────────────────────
const filterCtrl = L.control({ position: 'topleft' });
filterCtrl.onAdd = function() {
  const div = L.DomUtil.create('div', 'map-legend');
  div.style.padding = '0.6rem 0.8rem';
  const statusesHtml = Object.entries(DATA_STATUSES).map(([value, label]) => `
    <label class="category-toggle">
      <input type="checkbox" class="js-status-toggle" value="${esc(value)}" checked>
      <span><span class="legend-dot" style="display:inline-block;background:${esc(DATA_STATUS_COLORS[value] || '#999')};margin-right:0.35rem;vertical-align:middle"></span>${esc(label)}</span>
    </label>
  `).join('');

  const categoriesHtml = DATA_CATEGORIES.map(category => `
    <label class="category-toggle">
      <input type="checkbox" class="js-category-toggle" value="${esc(category)}" checked>
      <span>${esc(DATA_CATEGORY_ICONS[category] || '📦')} ${esc(category)}</span>
    </label>
  `).join('');

  div.innerHTML = `
    <h4 style="margin-bottom:0.35rem">Status Filter</h4>
    <div id="map-status-filters" class="category-filter-list">${statusesHtml}</div>
    <h4 style="margin:0.55rem 0 0.35rem">Category Filter</h4>
    <div id="map-category-filters" class="category-filter-list">${categoriesHtml}</div>
  `;
  L.DomEvent.disableClickPropagation(div);
  return div;
};
filterCtrl.addTo(map);

const markerGroup = L.markerClusterGroup({
  showCoverageOnHover: false,
  spiderfyOnMaxZoom: true,
  maxClusterRadius: 42,
  iconCreateFunction(cluster) {
    return L.divIcon({
      className: 'vrwa-cluster-icon',
      html: `<div class="vrwa-cluster-bubble">${cluster.getChildCount()}</div>`,
      iconSize: [38, 38]
    });
  }
}).addTo(map);

async function renderMarkers() {
  markerGroup.clearLayers();
  itemById.clear();

  try {
    const items = await VRWAData.getAllItems();
    const filtered = items.filter(item => {
      const hasCoords = Number.isFinite(Number(item.lat)) && Number.isFinite(Number(item.lon));
      return hasCoords
        && activeStatuses.has(item.status || 'available')
        && activeCategories.has(item.category || 'Other');
    });

    filtered.forEach(item => {
      itemById.set(item.id, item);
      const marker = L.marker([Number(item.lat), Number(item.lon)], { icon: buildMarkerIcon(item) });
      marker.bindPopup(buildSummaryPopup(item), { maxWidth: 300 });
      marker.on('mouseover', function() { this.openPopup(); });
      markerGroup.addLayer(marker);
    });

    if (filtered.length) {
      map.fitBounds(markerGroup.getBounds(), { padding: [24, 24] });
    } else {
      map.setView(defaultView.center, defaultView.zoom);
    }
  } catch (err) {
    console.error('Map data failed to load:', err);
  }
}

map.on('popupopen', function(e) {
  const popupEl = e.popup.getElement();
  if (!popupEl) return;

  const link = popupEl.querySelector('.js-popup-more');
  if (!link) return;

  link.addEventListener('click', function(evt) {
    evt.preventDefault();
    const item = itemById.get(link.dataset.itemId);
    if (!item) return;
    e.popup.setContent(buildDetailPopup(item));
    e.popup.update();
  }, { once: true });
});

document.addEventListener('change', function(e) {
  if (e.target.classList.contains('js-status-toggle')) {
    const status = e.target.value;
    if (e.target.checked) {
      activeStatuses.add(status);
    } else {
      activeStatuses.delete(status);
    }
    renderMarkers();
    return;
  }

  if (e.target.classList.contains('js-category-toggle')) {
    const category = e.target.value;
    if (e.target.checked) {
      activeCategories.add(category);
    } else {
      activeCategories.delete(category);
    }
    renderMarkers();
  }
});

renderMarkers();
</script>
